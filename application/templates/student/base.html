<body>
<div class="py-2 bg-primary">
    <div class="container">
        <div class="row no-gutters d-flex align-items-start align-items-center px-3 px-md-0">
            <div class="col-lg-12 d-block">
                <div class="row d-flex">
                    <div class="col-md-5 pr-4 d-flex topper align-items-center">

                    </div>

                    </div>
                    <div class="col-md pr-4 d-flex topper align-items-center">

                    </div>
                    <div class="col-md pr-4 d-flex topper align-items-right">

                                class="glyphicon glyphicon-user"></span></div>
                        <a class="btn btn-lg" href="{% url 'application:change_password' %}" role="button"><span
                                class="text"><u>Change password</u></span></a>
                        <a class="btn btn-outline-primary" href="{% url 'application:logout' %}" role="button"><span
                                class="text">Logout</span></a>  <!--ADD LOGOUT HERE-->
                    </div>
                </div>
            </div>
        </div>
    </div>
