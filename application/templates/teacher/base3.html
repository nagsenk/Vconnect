<!DOCTYPE html>
<html lang="en">
<head>
    <title>VConnect - Educating the world</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">

    <link href="https://fonts.googleapis.com/css?family=Work+Sans:100,200,300,400,500,600,700,800,900" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Fredericka+the+Great" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="../../static/application/css/open-iconic-bootstrap.min.css">
    <link rel="stylesheet" href="../../static/application/css/animate.css">

    <link rel="stylesheet" href="../../static/application/css/owl.carousel.min.css">
    <link rel="stylesheet" href="../../static/application/css/owl.theme.default.min.css">
    <link rel="stylesheet" href="../../static/application/css/magnific-popup.css">

    <link rel="stylesheet" href="../../static/application/css/aos.css">

    <link rel="stylesheet" href="../../static/application/css/ionicons.min.css">

    <link rel="stylesheet" href="../../static/application/css/flaticon.css">
    <link rel="stylesheet" href="../../static/application/css/icomoon.css">
    <link rel="stylesheet" href="../../static/application/css/style.css">
    <link rel="stylesheet" href="../../static/application/css/style3.css">
</head>
<body>
<div class="py-2 bg-primary">
    <div class="container">
        <div class="row no-gutters d-flex align-items-start align-items-center px-3 px-md-0 pull-right">
            <div class="col-lg-12 d-block">
                <div class="row d-flex">
                    <div class="col-md pr-4 d-flex topper align-items-right">
                        <div class="icon bg-tertiary mr-2 d-flex justify-content-center align-items-center"><span
                                class="glyphicon glyphicon-user"></span></div>
                        <a class="btn btn-outline-primary" href="{% url 'application:logout' %}" role="button"><span
                                class="text">LogOut</span></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<nav class="navbar navbar-expand-lg navbar-light bg-light ftco_navbar ftco-navbar-light" id="ftco-navbar">
    <div class="container d-flex align-items-center">
        <a class="navbar-brand" href="{% url 'application:teacher' %}" style="font-size: 24px">VConnect - Educating the world</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#ftco-nav"
                aria-controls="ftco-nav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="oi oi-menu"></span> Menu
        </button>
        <div class="collapse navbar-collapse" id="ftco-nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item {% block home_active %}{% endblock %}"><a href="{% url 'application:teacher' %}" class="nav-link pl-0">Home</a>
                </li>
                <li class="nav-item" {% block upload %}{% endblock %}><a href="
                    {% url 'application:educator_upload' %}" class="nav-link">Upload Study Materials</a></li>
                <li class="nav-item" {% block my_upload %}{% endblock %}><a href="
                    {% url 'application:educator_myuploads' %}" class="nav-link">My uploads</a></li>

            </ul>
        </div>
    </div>
</nav>


<!-- END nav -->

{% block body %}

{% endblock %}


<br><br><br><br><br><br><br><br><br><br><br><br><br><br>



<!-- loader -->
<div id="ftco-loader" class="show fullscreen">
    <svg class="circular" width="48px" height="48px">
        <circle class="path-bg" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke="#eeeeee"/>
        <circle class="path" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke-miterlimit="10"
                stroke="#F96D00"/>
    </svg>
</div>


<script src="../../static/application/js/jquery.min.js"></script>
<script src="../../static/application/js/jquery-migrate-3.0.1.min.js"></script>
<script src="../../static/application/js/popper.min.js"></script>
<script src="../../static/application/js/bootstrap.min.js"></script>
<script src="../../static/application/js/jquery.easing.1.3.js"></script>
<script src="../../static/application/js/jquery.waypoints.min.js"></script>
<script src="../../static/application/js/jquery.stellar.min.js"></script>
<script src="../../static/application/js/owl.carousel.min.js"></script>
<script src="../../static/application/js/jquery.magnific-popup.min.js"></script>
<script src="../../static/application/js/aos.js"></script>
<script src="../../static/application/js/jquery.animateNumber.min.js"></script>
<script src="../../static/application/js/scrollax.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBVWaKrjvy3MaE7SQ74_uJiULgl1JY0H2s&sensor=false"></script>
<script src="../../static/application/js/google-map.js"></script>
<script src="../../static/application/js/main.js"></script>

</body>
</html>
